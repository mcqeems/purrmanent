services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_POSTGRES}
      POSTGRES_DB: ${POSTGRES_DB:-purrmanent}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-purrmanent}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./src/backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      API_GLOBAL_PREFIX: ${API_GLOBAL_PREFIX:-api}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${SERVICE_PASSWORD_POSTGRES}@postgres:5432/${POSTGRES_DB:-purrmanent}
      BETTER_AUTH_SECRET: ${SERVICE_BASE64_AUTHSECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      RESEND_API_KEY: ${RESEND_API_KEY}
      MAIL_FROM: ${MAIL_FROM}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://router.bynara.id/v1}
      LLM_MODEL: ${LLM_MODEL:-mimo-v2.5-hermes}
      LLM_MODEL_PRO: ${LLM_MODEL_PRO:-mimo-v2.5-pro-hermes}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:team@example.com}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Jakarta}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./src/frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NEXT_PUBLIC_SUPABASE_BUCKET: ${NEXT_PUBLIC_SUPABASE_BUCKET:-cat-images}
    depends_on:
      - backend

volumes:
  pgdata:
